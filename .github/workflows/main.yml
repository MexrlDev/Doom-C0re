name: Generate Repo Map

on:
  push:
  workflow_dispatch:

jobs:
  map:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate repo map
        run: |
          find . -type f \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            | sed 's|^\./|/|' \
            | sort > repo_map.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-map
          path: repo_map.txt
